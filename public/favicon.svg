<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background pill -->
  <rect width="32" height="32" rx="7" fill="#1E3A5F"/>

  <!-- Car body — side profile -->
  <!-- Roof -->
  <path d="M6 18 L9 12 Q10.5 10 12.5 10 L19.5 10 Q21.5 10 23 12 L26 18 Z" fill="#3B82F6"/>

  <!-- Car lower body -->
  <rect x="5" y="18" width="22" height="5" rx="1" fill="#3B82F6"/>

  <!-- Windshield -->
  <path d="M10 17.5 L12.5 11.5 L19.5 11.5 L22 17.5 Z" fill="#1E3A5F" opacity="0.5"/>

  <!-- Trunk lid — open (raised) -->
  <path d="M19.5 10 Q22 9 23.5 7 Q24 8.5 23 12" fill="none" stroke="#60A5FA" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Small box in trunk area -->
  <rect x="19" y="14" width="5" height="4" rx="0.5" fill="#FCD34D" opacity="0.95"/>
  <line x1="19" y1="16" x2="24" y2="16" stroke="#F59E0B" stroke-width="0.6"/>
  <line x1="21.5" y1="14" x2="21.5" y2="18" stroke="#F59E0B" stroke-width="0.6"/>

  <!-- Wheels -->
  <circle cx="10" cy="23.5" r="2.5" fill="#1E3A5F"/>
  <circle cx="10" cy="23.5" r="1.2" fill="#64748B"/>
  <circle cx="22" cy="23.5" r="2.5" fill="#1E3A5F"/>
  <circle cx="22" cy="23.5" r="1.2" fill="#64748B"/>

  <!-- Checkmark bottom-right -->
  <circle cx="25.5" cy="25.5" r="4.5" fill="#10B981"/>
  <path d="M23 25.5 L25 27.5 L28 23.5" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>